<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Form Validation</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        form {
            max-width: 520px;
            margin: 0 auto;
            padding: 1.5rem;
            background: #ffffff;
            border: 1px solid #dbe2ea;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        form > div {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 0.85rem;
            border: 1px solid #bcc7d4;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        button {
            padding: 0.8rem 1.2rem;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        #name-error,
        #address-error,
        #phone-error {
            min-height: 1.25rem;
            margin-top: 0.35rem;
            color: #b91c1c;
            font-size: 0.9rem;
        }

        #name-error p,
        #address-error p,
        #phone-error p {
            margin: 0;
        }
    </style>
</head>
<body>
    <form id="myform">
        <div id="name-field">
            <label>Name: <input id="name" name="name" minlength="5" maxlength="50"></label>
            <div id="name-error"></div>
        </div>
        <div id="address-field">
            <label>Street Address: <input id="address" name="address" pattern="^\d+.+$"></label>
            <div id="address-error"></div>
        </div>
        <div id="phone-field">
            <label>Phone Number: <input id="phone" name="phone"></label>
            <div id="phone-error"></div>
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
<script>
    const myform = document.getElementById("myform")
    const nameField = document.getElementById("name")
    const addressField = document.getElementById("address")
    const phoneField = document.getElementById("phone")

    const nameError = document.getElementById("name-error")
    const addressError = document.getElementById("address-error")
    const phoneError = document.getElementById("phone-error")

    const phoneRegex = /^\d{3}-\d{3}-\d{4}/
    function validateName(){
        if (!nameField.validity.valid || nameField.value.length < 5 || nameField.value.length > 50) {
            nameError.innerHTML = `<p>Name is not valid. Please ensure 5-50 characters</p>`
            return false
        }
        return true
    }

    function validateAddress(){
        if (!addressField.validity.valid || addressField.value.length == 0) { 
            addressError.innerHTML = `<p>Address is not valid. Street address should start with a number.</p>`
            return false
        }
        return true
    }

    function validatePhone(){
        if (!phoneRegex.test(phoneField.value)){
            phoneError.innerHTML = `<p>Phone is not valid. Phone should match pattern xxx-xxx-xxxx.</p>`
            return false
        }
        return true
    }

    myform.addEventListener("submit", (event) => {
        event.preventDefault()
        if (validateName() & validateAddress() & validatePhone()){
            myform.submit()
        }
    })
</script>
</html>
