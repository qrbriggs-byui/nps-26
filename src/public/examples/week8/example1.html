<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transitions and Animations</title>
    <style>
      #demo1, #demo2, #demo3 {
        width: 800px;
        border: 3px solid black;
        display: flex;
        justify-content: center;

      }

      #box1 {
        width: 200px;
        height: 200px;
        background-color: red;        
      }

      #box1:hover {
        animation: box-animation 1s linear;
        background-color: blue;
      }

      @keyframes box-animation {
        0% {
          background-color: red;
        }
        25% {
          background-color: maroon;
        }
        50% {
          background-color: black;
        }
        75% {
          background-color: navy;
        }
        100% {
          background-color: blue;
        }
      }

      #box2{
        background-color: blue;
        width: 200px;
        height: 200px;
        transition: background-color 1s ease-in-out;
      }

      #box2:hover{
        background-color: red;        
      }

      #box3{
        height: 100%;
        transition: transform 0.5s ease-in-out;        
      }

      #box3:hover{
        transform: scale(1.5);                
      }
    </style>
  </head>
  <body>
    <h1>Demo 1 - Animations</h1>
    <div id="demo1">
      <div id="box1"></div>
    </div>
    <h1>Demo 2 - Transitions</h1>
    <div id="demo2">
      <div id="box2"></div>
    </div>
    <h1>Demo 3 - Transitions 2</h1>
    <div id="demo3">
        <div id="box3"><img src="https://placecats.com/200/200" alt="Sample Image"></div>
    </div>
  </body>
    <script>

    </script>    
</html>
